  <circle cx="24" cy="34" r="3"   fill="#7B2FFF" filter="url(#nv-glow)"/>
  <circle cx="46" cy="2"  r="2.5" fill="#00F0FF" filter="url(#nv-glow)"/>
  <circle cx="13" cy="18" r="1.5" fill="#00F0FF" opacity="0.7"/>
  <circle cx="35" cy="18" r="1.5" fill="#00F0FF" opacity="0.7"/>
  <line x1="13" y1="18" x2="35" y2="18" stroke="#00F0FF" stroke-width="0.6" opacity="0.3"/>

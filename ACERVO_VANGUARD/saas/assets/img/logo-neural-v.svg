<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 36" width="48" height="36" role="img" aria-label="Vanguard Neural V">
  <defs>
    <linearGradient id="nv-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#7B2FFF"/>
    </linearGradient>
    <filter id="nv-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>

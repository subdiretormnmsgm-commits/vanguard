server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
      "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://*.supabase.co; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com;"
      always;

    location ~* \.(css|js|png|jpg|svg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /dashboard/ {
        try_files $uri $uri/ /dashboard/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Marketplace V7 (Dark Bazaar — Packs de Nicho) ────────────────────
    location /marketplace/ {
        try_files $uri $uri/ /marketplace/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── SaaS PWA (Multi-Tenant Dashboard V6) ─────────────────────────────
    location /saas/ {
        try_files $uri $uri/ /saas/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Intelligence Landing Page (V8) ───────────────────────────────────
    location /intelligence/ {
        try_files $uri $uri/ /intelligence/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Vanguard Score™ Microsite (V9) ───────────────────────────────────
    location /score/ {
        try_files $uri $uri/ /score/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Certifica: badges SVG (long cache) + verify pages (no-cache) ─────
    location ~* ^/certifica/badge/.*\.svg$ {
        proxy_pass         http://vanguard_api:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_cache_valid  200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location /certifica/ {
        proxy_pass         http://vanguard_api:9000/certifica/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── API Bridge (FastAPI on port 9000) ─────────────────────────────────
    location /api/ {
        proxy_pass         http://vanguard_api:9000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }

    # ── Intelligence API (FastAPI /v1/) ───────────────────────────────────
    location /v1/ {
        proxy_pass         http://vanguard_api:9000/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering    off;
        add_header X-Powered-By "Vanguard Intelligence API v1" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

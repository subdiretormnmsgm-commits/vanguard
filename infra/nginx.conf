# ── Rate Limiting Zones ────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_scraper:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_public:10m   rate=120r/m;

# ── Audit Log Format ───────────────────────────────────────────────────────────
log_format audit_vanguard '$time_iso8601 $remote_addr "$request" '
                           '$status $body_bytes_sent "$http_user_agent" '
                           '$request_time';

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/audit.log audit_vanguard;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
      "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://*.supabase.co https://cdn.jsdelivr.net; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com;"
      always;

    location ~* \.(css|js|png|jpg|svg|ico|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /dashboard/ {
        try_files $uri $uri/ /dashboard/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /marketplace/ {
        try_files $uri $uri/ /marketplace/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /saas/ {
        try_files $uri $uri/ /saas/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /intelligence/ {
        try_files $uri $uri/ /intelligence/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /score/ {
        try_files $uri $uri/ /score/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API endpoints — retorna 503 até backend real ser implantado
    location /api/ {
        return 503 '{"error":"API not yet deployed"}';
        add_header Content-Type application/json always;
    }

    location /v1/ {
        return 503 '{"error":"API not yet deployed"}';
        add_header Content-Type application/json always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}

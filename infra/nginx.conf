# ── V11: Rate Limiting Zones ──────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_scraper:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_public:10m   rate=120r/m;

# ── V11: Audit Log Format ─────────────────────────────────────────────────────
log_format audit_vanguard '$time_iso8601 $remote_addr "$request" '
                           '$status $body_bytes_sent "$http_user_agent" '
                           '$request_time upstream=$upstream_response_time';

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/audit.log audit_vanguard;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
      "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://*.supabase.co https://cdn.jsdelivr.net; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com;"
      always;

    location ~* \.(css|js|png|jpg|svg|ico|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /dashboard/ {
        try_files $uri $uri/ /dashboard/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Marketplace V7 (Dark Bazaar — Packs de Nicho) ────────────────────
    location /marketplace/ {
        try_files $uri $uri/ /marketplace/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── SaaS PWA (Multi-Tenant Dashboard V6) ─────────────────────────────
    location /saas/ {
        try_files $uri $uri/ /saas/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Intelligence Landing Page (V8) ───────────────────────────────────
    location /intelligence/ {
        try_files $uri $uri/ /intelligence/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Vanguard Score™ Microsite (V9) ───────────────────────────────────
    location /score/ {
        try_files $uri $uri/ /score/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Certifica: badges SVG (long cache) + verify pages (no-cache) ─────
    location ~* ^/certifica/badge/.*\.svg$ {
        proxy_pass         http://vanguard_api:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_cache_valid  200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location /certifica/ {
        proxy_pass         http://vanguard_api:9000/certifica/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── API Bridge (FastAPI on port 9000) — Rate Limited V11 ─────────────
    location /api/scraper {
        limit_req zone=api_scraper burst=2 nodelay;
        limit_req_status 429;
        proxy_pass         http://vanguard_api:9000/api/scraper;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        add_header X-RateLimit-Policy "5req/min" always;
    }

    location /api/ {
        limit_req zone=api_general burst=10 nodelay;
        limit_req_status 429;
        proxy_pass         http://vanguard_api:9000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        add_header X-RateLimit-Policy "30req/min" always;
    }

    # ── Intelligence API (FastAPI /v1/) ───────────────────────────────────
    location /v1/ {
        proxy_pass         http://vanguard_api:9000/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering    off;
        add_header X-Powered-By "Vanguard Intelligence API v1" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

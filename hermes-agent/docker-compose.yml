version: "3.9"

# Hermes Agent — Motor Autônomo do Pentalateral IAH (V28)
# Deploy: EasyPanel -> New Service -> Docker Compose
# Imagem: nousresearch/hermes-agent (MIT, v0.14.0)
# P-110: fallback = n8n + session_start manual se container offline

services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-pentalateral
    restart: unless-stopped
    environment:
      # API do modelo (Claude Sonnet como cerebro principal)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HERMES_MODEL=claude-sonnet-4-6
      # Memoria persistente SQLite
      - HERMES_MEMORY_PATH=/data/hermes_memory.db
      # Skill do Pentalateral (graus A/B/C)
      - HERMES_SKILL_PATH=/skills/pentalateral-graus-abc.md
      # Integracao n8n (webhook para classificacao de sinais W-8)
      - N8N_WEBHOOK_BASE=${N8N_WEBHOOK_BASE}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      # Telegram (Registro de Iniciativa diario ao Diretor)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID_DIRETOR=${TELEGRAM_CHAT_ID_DIRETOR}
      # Supabase (silenced_signals_log)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      # Claude Code CLI (para operacoes Grau C)
      - CLAUDE_CODE_PATH=/usr/local/bin/claude
    volumes:
      # Memoria persistente entre restarts
      - hermes_data:/data
      # Skill dos graus A/B/C (montada do repo)
      - ./skills:/skills:ro
      # Logs auditaveis
      - hermes_logs:/logs
    ports:
      # Health check endpoint (ping_hermes.ps1 consulta esta porta)
      - "8888:8888"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "easypanel.domain=${HERMES_DOMAIN}"
      - "easypanel.port=8888"

volumes:
  hermes_data:
    driver: local
  hermes_logs:
    driver: local

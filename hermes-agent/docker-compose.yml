version: "3.9"

# Hermes Agent -- Motor Autônomo do Pentalateral IAH (V28)
# Imagem oficial: nousresearch/hermes-agent (MIT, Nous Research)
# Deploy: EasyPanel -> New Service -> Docker Compose
#
# Prerequisito: OPENROUTER_API_KEY de openrouter.ai/keys
# Modelo usado: anthropic/claude-sonnet-4-6 (via OpenRouter)
#
# P-110: fallback manual = session_start + WIP_BOARD + PENDENTES (3 passos)

services:
  # --- GATEWAY: o agente autônomo principal ---
  gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-pentalateral
    restart: unless-stopped
    volumes:
      - hermes_data:/opt/data
    environment:
      # LLM via OpenRouter (suporta anthropic/claude-sonnet-4-6)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

      # Telegram: canal de comunicação com o Diretor
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - TELEGRAM_HOME_CHANNEL=${TELEGRAM_HOME_CHANNEL}
      - TELEGRAM_HOME_CHANNEL_NAME=Vanguard Pentalateral

      # API Server: expõe endpoint para W-8 enviar sinais ao Hermes
      # Autenticação obrigatória (P-110: nunca expor sem API_SERVER_KEY)
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${HERMES_API_SERVER_KEY}
    ports:
      - "9099:9099"
    command: ["gateway", "run"]

  # --- DASHBOARD: painel de gestão (localhost only) ---
  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - hermes_data:/opt/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open"]
    ports:
      - "9119:9119"

volumes:
  hermes_data:
    driver: local

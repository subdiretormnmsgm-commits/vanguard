        - generic [ref=e65]: RECURSO ORDINÁRIO EM HABEAS CORPUS. MEDIDAS CAUTELARES DIVERSAS DA PRISÃO. PROPORCIONALIDADE. NECESSIDADE. As medidas cautelares diversas da prisão previstas no art. 319 do CPP devem ser aplicadas preferencialmente à prisão preventiva, obedecendo ao princípio da proporcionalidade e da menor restrição possível à liberdade do acusado. A prisão preventiva só se justifica quando as medidas alternativas se mostrarem insuficientes.

# Supabase config — PROJ-002 Ingrid
# project_id deve bater com o ref do projeto no dashboard
project_id = "yjqvjhezwhepwomukudt"
# db.major_version corrigido para 17 (aviso CLI 2.101)

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false

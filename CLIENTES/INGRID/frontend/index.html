<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00F0FF" />
  <title>Sedes-DF 2026</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css?v=19" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

<header>
  <span class="header-title" id="logo-tap">Sedes-DF 2026</span>
  <div class="contador-pontos">
    <span class="label">pts</span>
    <span id="pontos-valor">0</span>
  </div>
  <span class="progresso-pill" id="progresso-header">–</span>
</header>

<!-- Dashboard / Debug Panel (3 toques no logo — Eduardo only) -->
<div id="debug-panel" class="debug-panel" style="display:none">
  <div class="debug-header">⚙️ Dashboard · <span style="color:#00F0FF">v19</span></div>

  <!-- N-3: Linha de Corte configurável -->
  <div class="dash-section">
    <div class="dash-label">📊 Linha de Corte (N-3)</div>
    <div class="dash-row">
      <input type="number" id="dash-corte-input" value="67" min="1" max="200" class="dash-input" />
      <span class="dash-unit">pts</span>
      <button id="dash-corte-save" class="dash-btn">Salvar</button>
    </div>
    <div id="dash-corte-status" class="dash-status">–</div>
  </div>

  <!-- Nota Simulada de Prova (estatística) — Dia 15 -->
  <div class="dash-section">
    <div class="dash-label">🎯 Nota Simulada de Prova</div>
    <div id="dash-nota-valor" class="dash-nota-valor">–</div>
    <div class="meta-barra-bg" style="margin:6px 0 4px">
      <div id="dash-nota-fill" class="meta-barra-fill" style="width:0%"></div>
    </div>
    <div id="dash-nota-info" class="dash-info">Calculando…</div>
  </div>

  <!-- F-5: Modo Véspera — ativar 7 dias antes da prova (2026-08-30) -->
  <div class="dash-section">
    <div class="dash-label">🌙 Modo Véspera (M-3)</div>
    <div class="dash-row" style="align-items:center;gap:10px">
      <label class="dash-toggle-label" for="dash-vespera-toggle">Só revisões SM-2</label>
      <input type="checkbox" id="dash-vespera-toggle" class="dash-toggle" />
    </div>
    <div class="dash-info" style="margin-top:4px">Ativar ~2026-08-30 · Prova: 2026-09-06</div>
  </div>

  <!-- N-1: Push Mágico de Oz -->
  <div class="dash-section">
    <div class="dash-label">💬 Push Mágico de Oz (N-1)</div>
    <div id="dash-push-info" class="dash-info">Carregando…</div>
    <button id="dash-push-copy" class="dash-btn">Copiar mensagem</button>
  </div>

  <!-- Debug técnico -->
  <div class="dash-section dash-debug-wrap">
    <div class="dash-label">🔧 Debug</div>
    <div id="debug-content" class="debug-content">v18 · aguardando questão…</div>
    <button onclick="window._testG5()" style="margin-top:6px;padding:5px 10px;background:#1A0B2E;color:#00F0FF;border:1px solid rgba(0,240,255,0.4);border-radius:6px;cursor:pointer;font-size:11px">⚡ TESTAR G-5</button>
  </div>
</div>

<main id="main-content">
  <div class="estado-vazio">
    <div class="spinner"></div>
    <p>Carregando…</p>
  </div>
</main>

<!-- ── TEMPLATES ──────────────────────────────────────────────────────── -->

<template id="tpl-clickwrap">
  <div class="clickwrap-screen">
    <div class="clickwrap-logo">Sedes-DF 2026</div>
    <h1 class="clickwrap-titulo">Sua ferramenta de estudo está pronta.</h1>
    <div class="clickwrap-corpo">
      <p>Antes de começar, precisamos de uma confirmação rápida.</p>
      <div class="clickwrap-box">
        <p>Esta ferramenta foi desenvolvida exclusivamente para você.
           O acesso é pessoal e intransferível. Ao clicar em Iniciar,
           você declara que leu e concorda com os Termos de Uso.</p>
      </div>
    </div>
    <button class="btn-iniciar" id="btn-aceitar-termo">
      Aceito os Termos — Iniciar
    </button>
    <p class="clickwrap-rodape">Seu progresso fica salvo automaticamente.</p>
  </div>
</template>

<template id="tpl-frase-abertura">
  <div class="frase-abertura">
    <span class="frase-texto"></span>
  </div>
</template>

<template id="tpl-pilula">
  <div class="pilula">
    <span class="pilula-icon">💡</span>
    <span class="pilula-texto"></span>
  </div>
</template>

<template id="tpl-questao">
  <div class="questao-card">
    <div class="questao-meta">
      <span class="badge-disciplina"></span>
      <span class="badge-tipo"></span>
      <span class="questao-numero"></span>
    </div>
    <div class="barra-progresso"><div class="barra-fill" style="width:0%"></div></div>
    <p class="questao-enunciado"></p>
    <div class="alternativas"></div>
  </div>
</template>

<template id="tpl-alternativa">
  <button class="alternativa">
    <span class="letra"></span>
    <span class="texto"></span>
  </button>
</template>

<template id="tpl-explicacao">
  <div class="explicacao">
    <div class="explicacao-header">
      <span class="icone-resultado"></span>
      <span class="texto-resultado"></span>
    </div>
    <div class="explicacao-body"></div>
    <div class="explicacao-nivel"></div>
  </div>
</template>

<template id="tpl-btn-proxima">
  <button class="btn-proxima">Próxima questão →</button>
</template>

<template id="tpl-fim">
  <div class="fim-sessao">
    <div style="font-size:48px">🎯</div>
    <h2>Sessão concluída!</h2>
    <div class="fim-stats">
      <div class="stat-box">
        <div class="valor" id="stat-acertos">0</div>
        <div class="desc">Acertos</div>
      </div>
      <div class="stat-box">
        <div class="valor" id="stat-pontos">0</div>
        <div class="desc">Pontos ponderados</div>
      </div>
      <div class="stat-box">
        <div class="valor" id="stat-pct">0%</div>
        <div class="desc">Aproveitamento</div>
      </div>
      <div class="stat-box">
        <div class="valor" id="stat-revisoes">0</div>
        <div class="desc">Para revisar</div>
      </div>
    </div>
    <p id="frase-encerramento" class="frase-encerramento" style="display:none"></p>
    <p style="color:var(--muted);font-size:13px;max-width:280px;line-height:1.5">
      Volte amanhã. O SM-2 já agendou suas revisões.
    </p>
    <button class="btn-novo-dia" id="btn-fechar">Fechar</button>
  </div>
</template>

<template id="tpl-mapa-soberania">
  <div class="mapa-soberania">
    <h2 class="mapa-titulo">Mapa de Soberania</h2>
    <p class="mapa-subtitulo">Disciplinas ordenadas por urgência de estudo</p>
    <div class="mapa-lista" id="mapa-lista"></div>
    <button class="btn-novo-dia" id="btn-fechar-mapa">Fechar</button>
  </div>
</template>

<template id="tpl-mapa-item">
  <div class="mapa-item">
    <div class="mapa-item-header">
      <span class="mapa-disc-nome"></span>
      <span class="mapa-nivel-badge"></span>
    </div>
    <div class="mapa-barra-container">
      <div class="mapa-barra-fill"></div>
    </div>
    <div class="mapa-item-stats">
      <span class="mapa-taxa"></span>
      <span class="mapa-atividade"></span>
      <span class="mapa-revisoes"></span>
    </div>
  </div>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<script src="app.js?v=19"></script>
</body>
</html>

version: '3.8'

# ╔══════════════════════════════════════════════════════════════════════╗
# ║  VANGUARD V10 — THE SOVEREIGN FORTRESS — Docker Compose Mestre       ║
# ║  Orquestra: Frontend PWA · API SaaS · Intelligence API · Fractal WL  ║
# ║             Arbitragem · Certifica · Hermes Voice · Scraper IA · n8n ║
# ║             Fortress: Health Monitor · IA Firefighter · Stress Test  ║
# ║                                                                      ║
# ║  Deploy  : docker compose up -d                                      ║
# ║  Fortress: curl http://localhost:9000/api/fortress/health             ║
# ║  Stress  : python tests/stress_test.py --n 1000 --url http://localhost:9000 ║
# ║  Logs    : docker compose logs -f                                    ║
# ╚══════════════════════════════════════════════════════════════════════╝

services:

  # ──────────────────────────────────────────────────────────────────────
  # PWA Frontend — nginx serve static files + White-Label brand injection
  # ──────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: vanguard-frontend:v5
    container_name: vanguard_frontend
    restart: always
    ports:
      - '80:80'
    environment:
      # Feature 03: White-Label — override these per client
      - BRAND_NAME=${BRAND_NAME:-VANGUARD}
      - BRAND_TAGLINE=${BRAND_TAGLINE:-Forja de Ecossistemas Digitais}
      - BRAND_PRIMARY=${BRAND_PRIMARY:-#00F0FF}
      - BRAND_SECONDARY=${BRAND_SECONDARY:-#1A0B2E}
      - BRAND_ACCENT=${BRAND_ACCENT:-#7B2FFF}
      - BRAND_BG=${BRAND_BG:-#0A0A0A}
    networks:
      - vanguard_net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────
  # API Bridge V6 — FastAPI: Scraper trigger + Stripe billing + JWT auth
  # Feature 04: Multi-Tenant SaaS API
  # ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: vanguard-api:v10
    container_name: vanguard_api
    restart: always
    ports:
      - '9000:9000'
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE}
      - SAAS_URL=${SAAS_URL:-http://localhost/saas}
      - SCRAPER_IMAGE=vanguard-scraper:v5
      - DOCKER_NETWORK=vanguard_soberano_v5
      # V7: Marketplace Stripe Connect
      - STRIPE_CONNECT_WEBHOOK_SECRET=${STRIPE_CONNECT_WEBHOOK_SECRET}
      - MARKETPLACE_URL=${MARKETPLACE_URL:-http://localhost/marketplace}
      # V8: Intelligence API + Fractal
      - INTELLIGENCE_URL=${INTELLIGENCE_URL:-http://localhost/intelligence}
      - VANGUARD_API_URL=${VANGUARD_API_URL:-http://vanguard_api:9000}
      # V9: Sovereign Economy
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VAPI_KEY=${VAPI_KEY}
      - VAPI_PHONE_NUMBER_ID=${VAPI_PHONE_NUMBER_ID}
      - CERTIFICA_URL=${CERTIFICA_URL:-http://localhost}
      # V10: Sovereign Fortress
      - DIRECTOR_WEBHOOK_URL=${DIRECTOR_WEBHOOK_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vanguard_net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:9000/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────────────────────────
  # Scraper IA — Python on-demand (use docker compose run)
  # Feature 01: Claude Haiku Auditor integrado
  # ──────────────────────────────────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    image: vanguard-scraper:v5
    container_name: vanguard_scraper
    restart: 'no'
    profiles:
      - scraper
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY:-}
      - VANGUARD_QUIZ_URL=${VANGUARD_QUIZ_URL:-https://vanguardtech.com/#quiz}
    volumes:
      - ./outbound:/app/outbound
    networks:
      - vanguard_net
    command: >
      python scraper_vanguard.py
      --nicho ${SCRAPER_NICHO:-advocacia}
      --cidade ${SCRAPER_CIDADE:-São Paulo}
      --limite ${SCRAPER_LIMITE:-10}
      --modo ${SCRAPER_MODO:-osm}

  # ──────────────────────────────────────────────────────────────────────
  # n8n — Motor de Automação Hermes
  # Detecta novo lead no Supabase e dispara ai_hook via WhatsApp
  # ──────────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: hermes_n8n
    restart: always
    ports:
      - '5678:5678'
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST}/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_LOG_LEVEL=info
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflow-hermes.json:/home/node/.n8n/workflows/hermes.json:ro
    networks:
      - vanguard_net
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────
  # PostgreSQL — Persistência do n8n
  # ──────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: hermes_postgres
    restart: always
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vanguard_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U n8n']
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────
  # Hermes Webhook — FastAPI (receptor WhatsApp → Supabase → Claude)
  # ──────────────────────────────────────────────────────────────────────
  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    image: vanguard-hermes:v5
    container_name: hermes_webhook
    restart: always
    ports:
      - '8000:8000'
    environment:
      - WA_VERIFY_TOKEN=${WA_VERIFY_TOKEN}
      - WA_TOKEN=${WA_TOKEN}
      - WA_PHONE_NUMBER_ID=${WA_PHONE_NUMBER_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    networks:
      - vanguard_net
    depends_on:
      - n8n
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ──────────────────────────────────────────────────────────────────────────────
volumes:
  n8n_data:
    driver: local
  postgres_data:
    driver: local

networks:
  vanguard_net:
    driver: bridge
    name: vanguard_soberano_v5
